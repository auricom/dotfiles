# ~/.config/starship.toml
[aws]
format = "on [$symbol$profile]($style) "
style = "bold cyan"
symbol = "🅰 "

[battery]
full_symbol = "🔋"
charging_symbol = "🔌"
discharging_symbol = "⚡"

[[battery.display]]
threshold = 30
style = "bold red"

[character]
error_symbol = "[✖](bold red) "

[cmd_duration]
min_time = 10_000  # Show command duration over 10,000 milliseconds (=10 sec)
format = " took [$duration]($style)"

[directory]
read_only = "🔒"
read_only_style= "bold white"

[docker_context]
format = "via [🐋 $context](blue bold)"

[git_branch]
format = " [$symbol$branch]($style) "
style = "bold yellow"

[git_commit]
commit_hash_length = 8
style = "bold white"

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '

[git_status]
style = "fg:#E29191"

[golang]
symbol = " "

[hostname]
ssh_only = true
disabled = false

[nodejs]
disabled = true

[package]
symbol = " "

[python]
symbol = " "
pyenv_version_name = true       # Use pyenv to get Python version.

[time]
time_format = "%T"
format = "🕙 [$time]($style) "
disabled = false

[username]
style_user = "bold dimmed blue"
show_always = false