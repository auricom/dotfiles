taps:
  - fluxcd/tap
  - ublue-os/tap

brew:
  system:
    server: true
    packages:
      - fish # Friendly interactive shell
      - wget # Internet file retriever
      - yq # YAML parsing

  modern_cli:
    server: true
    packages:
      - bat # cat with syntax highlighting
      - duf # Disk Usage/Free Utility
      - dysk # Like df but better
      - eza # Modern replacement for ls
      - fd # Simple, fast alternative to find
      - fzf # A command-line fuzzy finder
      - ripgrep # ripgrep - faster grep

  shell_enhancements:
    server: true
    packages:
      - atuin # Magical shell history
      - starship # Cross-shell prompt
      - tmux # Terminal multiplexer
      - zoxide # Smarter cd command

  utilities:
    server: true
    packages:
      - age # A simple, modern and secure encryption tool
      - btop # Interactive process viewer
      - chezmoi # Dotfiles management
      - direnv # Load and unload environment variables depending on the current directory
      - dust # Disk analysis
      - git # Git version control
      - gum # Tool for glamorous shell script
      - mise # Dev tools, env vars, task runner
      - nmap # Network scanning
      - sops # Simple and flexible tool for managing secrets
      - yt-dlp # Music and video downloader

  development:
    server: false
    packages:
      - gh # GitHub CLI
      - lima # Linux VMs
      - opencode # AI agent
      - pi-coding-agent # AI Agent
      - pre-commit # Framework for managing and maintaining pre-commit hooks

  kubernetes:
    server: false
    packages:
      - k9s # Kubernetes TUI
      - kubernetes-cli # Kubernetes CLI
