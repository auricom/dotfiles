taps:
  - fluxcd/tap
  - ublue-os/tap
  - PeonPing/tap
  - valkyrie00/bbrew

brew:
  system:
    packages:
      - autoenv # Automatically source .env files when entering directories
      - fish # Friendly interactive shell
      - wget # Internet file retriever

  modern_cli:
    packages:
      - bat # cat with syntax highlighting
      - duf # Disk Usage/Free Utility
      - dysk # Like df but better
      - eza # Modern replacement for ls
      - fd # Simple, fast alternative to find
      - fzf # A command-line fuzzy finder
      - ripgrep # ripgrep - faster grep

  shell_enhancements:
    packages:
      - atuin # Magical shell history
      - starship # Cross-shell prompt
      - zellij # Terminal workspace and multiplexer
      - zoxide # Smarter cd command

  utilities:
    packages:
      - age # A simple, modern and secure encryption tool
      - btop # Interactive process viewer
      - chezmoi # Dotfiles management
      - direnv # Load and unload environment variables depending on the current directory
      - dust # Disk analysis
      - git # Git version control
      - gum # Tool for glamorous shell script
      - mise # Dev tools, env vars, task runner
      - nmap # Network scanning
      - sops # Simple and flexible tool for managing secrets
      - Valkyrie00/homebrew-bbrew/bbrew # Homebrew TUI
      - yt-dlp # Music and video downloader

  development:
    server: false
    packages:
      - ansible # Configuration management
      - ansible-lint # Best practices checker for Ansible
      - block-goose-cli # AI Agent
      - docker # Containerization platform
      - docker-compose # Multi-container Docker application management
      - gh # GitHub CLI
      - lima # Linux VMs
      - peon-ping # Game character voice lines
      - pi-coding-agent # AI Agent
      - pre-commit # Framework for managing and maintaining pre-commit hooks
      - ramalama # Local serving of AI models

  kubernetes:
    server: false
    packages:
      - k9s # Kubernetes TUI
      - kubernetes-cli # Kubernetes CLI

cask:
  applications:
    packages:
      - claude-code # Claude AI coding assistant
      - codex # OpenAI Codex CLI
      - goose-linux # Goose AI agent desktop app
      - vscodium-linux # VSCodium (VS Code without telemetry)

  fonts:
    packages:
      - font-adwaita-mono-nerd-font # Adwaita Mono with Nerd Font icons
      - font-caskaydia-cove-nerd-font # Cascadia Code with Nerd Font icons
      - font-geist-mono-nerd-font # Geist Mono with ligatures and Nerd Font icons
      - font-ibm-plex-mono # IBM Plex Mono
      - font-jetbrains-mono # JetBrains Mono
      - font-jetbrains-mono-nerd-font # JetBrains Mono with Nerd Font icons
      - font-source-code-pro # Adobe Source Code Pro

flatpak:
  browsers:
    packages:
      - app.zen_browser.zen # Zen Browser - privacy-focused Firefox-based browser
      - org.chromium.Chromium # Chromium - open-source web browser

  communication:
    packages:
      - com.rtosta.zapzap # ZapZap - WhatsApp desktop client
      - com.slack.Slack # Slack - team messaging and collaboration
      - dev.vencord.Vesktop # Vesktop - Discord client with Vencord mods
      - org.telegram.desktop # Telegram - messaging app

  development:
    packages:
      - dev.zed.Zed # Zed - high-performance code editor
      - io.kinvolk.Headlamp # Headlamp - Kubernetes dashboard

  media:
    packages:
      - fr.handbrake.ghb # HandBrake - video transcoder
      - io.github.quodlibet.QuodLibet # Quod Libet - music player and library manager
      - org.bunkus.mkvtoolnix-gui # MKVToolNix - create and edit MKV files
      - org.gnome.Showtime # GNOME Video player
      - org.musicbrainz.Picard # MusicBrainz Picard - music file tagger

  productivity:
    packages:
      - org.gnome.Evince # GNOME document viewer
      - com.onepassword.OnePassword # 1Password - password manager
      - info.portfolio_performance.PortfolioPerformance # Portfolio Performance - investment portfolio tracker
      - io.kopia.KopiaUI # Kopia UI - backup and restore tool

  utilities:
    packages:
      - com.github.Matoking.protontricks # Protontricks - run Winetricks for Steam games
      - com.github.PintaProject.Pinta # Pinta - simple drawing and image editing
      - com.github.tchx84.Flatseal # Flatseal - manage Flatpak permissions
      - com.makemkv.MakeMKV # MakeMKV - Blu-ray/DVD to MKV
      - io.github.dvlv.boxbuddyrs # BoxBuddy - Distrobox GUI
      - io.github.flattool.Ignition # Ignition - Flatpak startup manager
      - io.github.kolunmi.Bazaar # Bazaar - Flatpak storefront
      - io.github.totoshko88.RustConn # RustConn
      - it.mijorus.gearlever # Gear Lever - manage AppImage files
      - it.mijorus.smile # Smile - emoji picker
      - me.timschneeberger.GalaxyBudsClient # Galaxy Buds Client - manage Samsung Galaxy Buds
      - org.gnome.baobab # GNOME Disk usage analyzer
      - org.gnome.Calculator # GNOME Calculator
      - org.gnome.font-viewer # GNOME Font viewer
      - org.gnome.Loupe # GNOME Image viewer
      - org.gnome.TextEditor # GNOME Text Editor

  games:
    packages:
      - com.valvesoftware.Steam # Steam - gaming platform

  stream_deck:
    packages:
      - me.amankhanna.opendeck # OpenDeck - Stream Deck controller
